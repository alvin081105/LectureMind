server:
  port: 8081

spring:
  profiles:
    active: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

jwt:
  secret: ${JWT_SECRET:lecturemind-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: 1800000
  refresh-expiration: 604800000

anthropic:
  api-key: ${ANTHROPIC_API_KEY:여기에-Claude-API-키-입력}

openai:
  api-key: ${OPENAI_API_KEY:여기에-OpenAI-API-키-입력}

file:
  upload-dir: uploads
